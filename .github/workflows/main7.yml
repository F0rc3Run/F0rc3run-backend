name: Update VPN Servers

on:
  schedule:
    - cron: '0 */6 * * *'  # هر 6 ساعت
  workflow_dispatch:

env:
  GO_VERSION: '1.22'

jobs:
  update-servers:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    
    steps:
      # ============================================================
      # 1. کلون کردن ریپازیتوری خصوصی (F0rc3Run/Test)
      # ============================================================
      - name: Clone private repository
        run: |
          echo "📦 Cloning private repository..."
          git clone https://x-access-token:${{ secrets.PAT }}@github.com/F0rc3Run/Test.git ./source
          cd ./source
          echo "✅ Repository cloned successfully"
          ls -la

      # ============================================================
      # 2. Setup Go
      # ============================================================
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ./source/go.sum

      # ============================================================
      # 3. نصب وابستگی‌ها
      # ============================================================
      - name: Install Go dependencies
        working-directory: ./source
        run: |
          echo "📦 Installing dependencies..."
          go mod download
          go mod verify

      # ============================================================
      # 4. دانلود Xray-core
      # ============================================================
      - name: Download Xray-core
        working-directory: ./source
        run: |
          echo "📥 Downloading Xray-core..."
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q Xray-linux-64.zip
          chmod +x xray
          echo "✅ Xray-core downloaded"

      # ============================================================
      # 5. اجرای برنامه
      # ============================================================
      - name: Run proxy checker
        working-directory: ./source
        run: |
          echo "🚀 Running proxy checker..."
          go run . -config config.yaml
        continue-on-error: false

      # ============================================================
      # 6. بررسی فایل خروجی
      # ============================================================
      - name: Check output
        working-directory: ./source
        id: check_output
        run: |
          if [ ! -f ./output/servers.json ]; then
            echo "❌ servers.json not found!"
            echo "exists=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "✅ servers.json created successfully"
          echo "exists=true" >> $GITHUB_OUTPUT
          SERVER_COUNT=$(cat ./output/servers.json | jq -r '.total // 0')
          echo "📊 Server count: $SERVER_COUNT"
          echo "count=$SERVER_COUNT" >> $GITHUB_OUTPUT

      # ============================================================
      # 7. کلون کردن ریپازیتوری عمومی (با استفاده از PAT)
      # ============================================================
      - name: Clone public repository
        if: steps.check_output.outputs.exists == 'true'
        run: |
          echo "📦 Cloning public repository..."
          git clone https://x-access-token:${{ secrets.PAT }}@github.com/F0rc3Run/F0rc3run-backend.git ./public
          cd ./public
          echo "✅ Public repository cloned"

      # ============================================================
      # 8. کپی فایل به دایرکتوری servers (اختیاری - برای commit)
      # ============================================================
      - name: Copy servers.json to public repo (optional)
        if: steps.check_output.outputs.exists == 'true'
        run: |
          echo "📋 Copying servers.json..."
          mkdir -p ./public/servers
          cp ./source/output/servers.json ./public/servers/servers.json
          echo "✅ servers.json copied to ./public/servers/"

      # ============================================================
      # 9. Commit و Push (اختیاری - فقط برای نگهداری نسخه)
      # ============================================================
      - name: Commit and push servers.json (optional)
        if: steps.check_output.outputs.exists == 'true'
        working-directory: ./public
        run: |
          git config user.name "F0rc3Run Bot"
          git config user.email "bot@f0rc3run.local"
          
          git add servers/servers.json
          
          if git diff --staged --quiet; then
            echo "📝 No changes to servers.json"
          else
            echo "📝 Committing servers.json..."
            git commit -m "🔄 Update servers.json - $(date -u '+%Y-%m-%d %H:%M:%S UTC') - Count: ${{ steps.check_output.outputs.count }}"
            git push origin main
            echo "✅ servers.json pushed successfully"
          fi

      # ============================================================
      # 10. آپلود به Cloudflare R2 (اصلی)
      # ============================================================
      - name: Upload to Cloudflare R2
        if: steps.check_output.outputs.exists == 'true'
        uses: ryand56/r2-upload-action@latest
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-bucket: ${{ secrets.R2_BUCKET }}
          source-dir: ./source/output
          destination-dir: /

      # ============================================================
      # 11. ذخیره خروجی به عنوان Artifact
      # ============================================================
      - name: Upload artifact
        if: steps.check_output.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: servers-json
          path: ./source/output/servers.json
          retention-days: 7

      # ============================================================
      # 12. ارسال اعلان به تلگرام
      # ============================================================
      - name: Send Telegram notification
        if: always()
        run: |
          if [ "${{ steps.check_output.outputs.exists }}" == "true" ]; then
            STATUS="✅ Success"
            DETAILS="📊 Server count: ${{ steps.check_output.outputs.count }}"
          else
            STATUS="❌ Failed"
            DETAILS="⚠️ servers.json not generated"
          fi
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="🔄 *VPN Servers Update*%0A%0A📊 Status: $STATUS%0A$DETAILS%0A🕐 Time: $(date '+%Y-%m-%d %H:%M:%S UTC')%0A🔗 Repo: F0rc3run-backend" \
            -d parse_mode="Markdown"
