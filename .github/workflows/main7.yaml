name: Update VPN Servers

on:
  schedule:
    - cron: '0 */6 * * *'  # هر 6 ساعت
  workflow_dispatch:

env:
  GO_VERSION: '1.22'

jobs:
  update-servers:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    
    steps:
      # ============================================================
      # 1. کلون کردن ریپازیتوری خصوصی (F0rc3Run/Test)
      # ============================================================
      - name: Clone private repository
        uses: actions/checkout@v4
        with:
         repository: F0rc3Run/Test
         token: ${{ secrets.PAT }}
         path: source

      # ============================================================
      # 2. Setup Go
      # ============================================================
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
         go-version: '1.22'
      # ============================================================
      # 3. نصب وابستگی‌ها
      # ============================================================
      - name: Generate dependencies
        working-directory: ./source
        run: |
          go mod tidy
          go mod download
          go mod verify
      # ============================================================
      # 4. دانلود Xray-core
      # ============================================================
      - name: Download Xray-core
        working-directory: ./source
        run: |
          echo "📥 Downloading Xray-core..."
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q Xray-linux-64.zip
          chmod +x xray
          echo "✅ Xray-core downloaded"
      # ============================================================
      # 5. اجرای برنامه
      # ============================================================
      - name: Run proxy checker
        working-directory: ./source
        run: |
          echo "🚀 Running proxy checker..."
          go run . -config config.yaml
        continue-on-error: false

      # ============================================================
      # 5.5 دیباگ - نمایش دقیق محل فایل‌های تولید شده (در صورت بروز مشکل مسیر)
      # ============================================================
      - name: Debug output location
        if: always()
        working-directory: ./source
        run: |
          echo "Looking for servers.json anywhere under ./source:"
          find . -maxdepth 3 -iname "servers.json" 2>/dev/null || true
          echo "---"
          echo "Contents of ./output (expected location):"
          ls -la ./output 2>/dev/null || echo "./output does not exist"

      # ============================================================
      # 6. بررسی فایل خروجی
      # ============================================================
      - name: Check output
        working-directory: ./source
        id: check_output
        run: |
          if [ ! -f ./output/servers.json ]; then
            echo "❌ servers.json not found!"
            echo "exists=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "✅ servers.json created successfully"
          echo "exists=true" >> $GITHUB_OUTPUT
          SERVER_COUNT=$(cat ./output/servers.json | jq -r '.total // 0')
          echo "📊 Server count: $SERVER_COUNT"
          echo "count=$SERVER_COUNT" >> $GITHUB_OUTPUT

      # ============================================================
      # 7. کلون کردن ریپازیتوری عمومی (با استفاده از PAT)
      # ============================================================
      - name: Clone public repository
        if: steps.check_output.outputs.exists == 'true'
        run: |
          echo "📦 Cloning public repository..."
          git clone https://x-access-token:${{ secrets.PAT }}@github.com/F0rc3Run/F0rc3run-backend.git ./public
          cd ./public
          echo "✅ Public repository cloned"

      # ============================================================
      # 8. کپی فایل به دایرکتوری servers (اختیاری - برای commit)
      # ============================================================
      - name: Copy servers.json to public repo (optional)
        if: steps.check_output.outputs.exists == 'true'
        run: |
          echo "📋 Copying servers.json..."
          mkdir -p ./public/servers
          cp ./source/output/servers.json ./public/servers/servers.json
          echo "✅ servers.json copied to ./public/servers/"

      # ============================================================
      # 9. Commit و Push (اختیاری - فقط برای نگهداری نسخه)
      # ============================================================
      - name: Commit and push servers.json (optional)
        if: steps.check_output.outputs.exists == 'true'
        working-directory: ./public
        run: |
          git config user.name "F0rc3Run Bot"
          git config user.email "bot@f0rc3run.local"
          
          git add servers/servers.json
          
          if git diff --staged --quiet; then
            echo "📝 No changes to servers.json"
          else
            echo "📝 Committing servers.json..."
            git commit -m "🔄 Update servers.json - $(date -u '+%Y-%m-%d %H:%M:%S UTC') - Count: ${{ steps.check_output.outputs.count }}"
            git push origin main
            echo "✅ servers.json pushed successfully"
          fi

      # ============================================================
      # 10. آپلود servers.json به Cloudflare R2 (bucket: servers-bucket)
      # ============================================================
      - name: Prepare R2 upload
        if: steps.check_output.outputs.exists == 'true'
        run: |
          mkdir -p ./r2-upload
          cp ./source/output/servers.json ./r2-upload/servers.json
          echo "Files prepared for R2:"
          ls -lh ./r2-upload

      - name: Upload servers.json to R2
        if: steps.check_output.outputs.exists == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          pip3 install awscli --break-system-packages --quiet
          aws s3 cp ./r2-upload/servers.json \
            s3://${{ secrets.R2_BUCKET }}/servers.json \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            --content-type "application/json"
          echo "✅ servers.json uploaded to R2"

      # ============================================================
      # 11. ذخیره خروجی به عنوان Artifact
      # ============================================================
      - name: Upload artifact
        if: steps.check_output.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: servers-json
          path: ./source/output/servers.json
          retention-days: 7

      - name: Remove generated JSON
        if: always()
        run: |
          rm -rf ./r2-upload
          rm -f ./source/output/servers.json
          echo "Generated JSON removed"

      # ============================================================
      # 12. ارسال اعلان به تلگرام
      # ============================================================
      - name: Send Telegram notification
        if: always()
        run: |
          if [ "${{ steps.check_output.outputs.exists }}" == "true" ]; then
            STATUS="✅ Success"
            DETAILS="📊 Server count: ${{ steps.check_output.outputs.count }}"
          else
            STATUS="❌ Failed"
            DETAILS="⚠️ servers.json not generated"
          fi
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="7846092422" \
            -d text="🔄 *VPN Servers Update*%0A%0A📊 Status: $STATUS%0A$DETAILS%0A🕐 Time: $(date '+%Y-%m-%d %H:%M:%S UTC')%0A🔗 Repo: F0rc3run-backend" \
            -d parse_mode="Markdown"
